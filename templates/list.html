<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>会員一覧</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-4">
    <h1 class="mb-4">会員一覧</h1>

    <!-- 検索フォーム -->
    <form action="/" method="get" class="d-flex gap-2 mb-3">
        <input type="text" name="keyword" value="{{ keyword }}" placeholder="名前で検索" class="form-control w-25">
        <button type="submit" class="btn btn-primary">検索</button>
        <a href="/" class="btn btn-secondary">リセット</a>
    </form>

    <a href="/add" class="btn btn-success mb-3">会員追加</a>

    <!-- 会員一覧テーブル -->
    <table class="table table-bordered table-hover">
        <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>名前</th>
                <th>編集</th>
                <th>削除</th>
            </tr>
        </thead>
        <tbody>
            {% for member in members %}
            <tr>
              <td>{{ member[0] }}</td>
　　　　　　　　 <td>{{ member[1] }}</td>
              <td><a href="/edit/{{ member[0] }}" class="btn btn-sm btn-warning">編集</a></td>
              <td><a href="/delete/{{ member[0] }}" class="btn btn-sm btn-danger" onclick="return confirm('削除しますか？')">削除</a></td>
               
            </tr>
    
            {% endfor %}
        </tbody>
    </table>

    <a href="/download" class="btn btn-outline-primary">CSVダウンロード</a>
</div>
</body>
</html>
