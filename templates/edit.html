<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>会員編集</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-4">
    <h1 class="mb-4">会員編集</h1>
    <form action="/edit/{{ member[0] }}" method="post">
        <div class="mb-3">
            <label class="form-label">名前</label>
            <input type="text" name="name" value="{{ member[1] }}" class="form-control" required>
        </div>
        <div class="mb-3">
            <label class="form-label">メールアドレス</label>
            <input type="email" name="email" value="{{ member[2] }}" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-warning">更新</button>
        <a href="/" class="btn btn-secondary">戻る</a>
    </form>
</div>
</body>
</html>
